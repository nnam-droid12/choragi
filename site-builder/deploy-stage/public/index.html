<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alex Warren - Live in Austin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'fade-in-down': 'fadeInDown 1s ease-out 0.5s forwards',
                    },
                    keyframes: {
                        fadeInDown: {
                            '0%': {
                                opacity: '0',
                                transform: 'translateY(-20px)'
                            },
                            '100%': {
                                opacity: '1',
                                transform: 'translateY(0)'
                            },
                        },
                    },
                },
            },
        };
    </script>
    <style>
        /* A simple style for the initial loading state before React/Tailwind kick in */
        #root:empty {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-black text-gray-300 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            return (
                <div className="min-h-screen bg-zinc-900 flex flex-col items-center justify-center p-4 sm:p-8 space-y-16 text-center overflow-x-hidden">
                    
                    <header className="opacity-0 animate-fade-in-down">
                        <h2 className="text-xl sm:text-2xl font-light tracking-widest text-amber-400 uppercase">
                            Live In Concert
                        </h2>
                        <h1 className="text-6xl sm:text-8xl md:text-9xl font-black tracking-tighter text-white my-2">
                            ALEX WARREN
                        </h1>
                        <p className="text-lg sm:text-xl font-medium tracking-wide text-gray-400">
                            APRIL 15, 2026 &bull; AUSTIN, TEXAS
                        </p>
                    </header>

                    <section className="w-full">
                        <video 
                            src="https://videos.pexels.com/video-files/853825/853825-hd.mp4" 
                            autoPlay 
                            muted 
                            loop 
                            playsInline 
                            className="w-full max-w-2xl mx-auto rounded-lg shadow-2xl mb-8"
                        ></video>
                    </section>

                    <section className="w-full">
                        <h3 className="text-3xl font-bold text-white mb-8 tracking-wide">Official Tour Poster</h3>
                        <img 
                            src="https://images.unsplash.com/photo-1543321269-9d86d3680958?q=80&w=800&auto=format&fit=crop" 
                            alt="Concert Poster" 
                            className="w-full max-w-md mx-auto rounded-lg shadow-2xl mb-8" 
                        />
                    </section>

                    <section className="w-full max-w-lg mx-auto bg-zinc-800/50 p-6 sm:p-8 rounded-xl shadow-lg border border-zinc-700">
                        <h3 className="text-3xl font-bold text-white mb-4 tracking-wide">Register for Tickets</h3>
                        <p className="text-gray-400 mb-8">Sign up for pre-sale access and be the first to know when tickets go live.</p>
                        <form className="space-y-6" onSubmit={(e) => e.preventDefault()}>
                            <div>
                                <label htmlFor="name" className="block text-sm font-medium text-gray-300 text-left mb-2">Full Name</label>
                                <input 
                                    type="text" 
                                    id="name" 
                                    name="name" 
                                    className="w-full bg-zinc-900 border border-zinc-700 rounded-md py-2 px-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-amber-500" 
                                    placeholder="Your Name" 
                                />
                            </div>
                            <div>
                                <label htmlFor="email" className="block text-sm font-medium text-gray-300 text-left mb-2">Email Address</label>
                                <input 
                                    type="email" 
                                    id="email" 
                                    name="email" 
                                    className="w-full bg-zinc-900 border border-zinc-700 rounded-md py-2 px-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-amber-500" 
                                    placeholder="you@example.com" 
                                />
                            </div>
                            <div>
                                <label htmlFor="phone" className="block text-sm font-medium text-gray-300 text-left mb-2">Phone Number</label>
                                <input 
                                    type="tel" 
                                    id="phone" 
                                    name="phone" 
                                    className="w-full bg-zinc-900 border border-zinc-700 rounded-md py-2 px-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-amber-500 focus:border-amber-500" 
                                    placeholder="(555) 555-5555" 
                                />
                            </div>
                            <div>
                                <button 
                                    type="submit" 
                                    className="w-full bg-amber-500 text-zinc-900 font-bold py-3 px-4 rounded-md hover:bg-amber-400 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-zinc-800 focus:ring-amber-500 transition-colors duration-300 mt-4"
                                >
                                    Notify Me
                                </button>
                            </div>
                        </form>
                    </section>

                    <footer className="py-8 text-center text-gray-500">
                        <p>&copy; 2024 Alex Warren Music. All Rights Reserved.</p>
                    </footer>
                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
