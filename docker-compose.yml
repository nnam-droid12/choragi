version: '3.8'

services:
  ui-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.ui_dashboard
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - venue-finder
      - live-negotiator
      - creative-director
      - site-builder
      - digital-promoter

  live-negotiator:
    build:
      context: .
      dockerfile: Dockerfile.live_negotiator
    ports:
      - "8080:8080"
    env_file:
      - .env

  venue-finder:
    build:
      context: .
      dockerfile: Dockerfile.venue_finder
    ports:
      - "8081:8081"
    env_file:
      - .env

  creative-director:
    build:
      context: .
      dockerfile: Dockerfile.creative_director
    ports:
      - "8082:8082"
    env_file:
      - .env

  site-builder:
    build:
      context: .
      dockerfile: Dockerfile.site_builder
    ports:
      - "8083:8083"
    env_file:
      - .env

  digital-promoter:
    build:
      context: .
      dockerfile: Dockerfile.digital_promoter
    ports:
      - "8084:8084"
    env_file:
      - .env